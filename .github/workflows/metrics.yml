name: Update site metrics

on:
  schedule:
    - cron: "0 */3 * * *" # Regenerate every 3 hours
  push:
    paths:
      - ".github/workflows/metrics.yml" # Re-run when this file changes
  workflow_dispatch: # Allow manual runs from the Actions tab

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # ⚠️ Requires a Personal Access Token saved as a repo secret
          #    named METRICS_TOKEN — see setup instructions
          token: ${{ secrets.METRICS_TOKEN }}
          user: jheff4
          filename: metrics.svg
          template: classic
          config_timezone: Africa/Lagos

          # Resilience: don't fail the whole run if one plugin errors,
          # and retry on transient GitHub API failures
          plugins_errors_fatal: no
          retries: 3
          retries_delay: 120
          output_action: commit
          committer_message: "Update site metrics"

          # Base sections: recent activity, community stats, repo stats
          base: header, activity, community, repositories

          # Languages — computed across your repos
          # NOTE: "recently-used" section removed — it has a crash bug
          # (TypeError in recent.mjs) when commit events lack committer data
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_limit: 8

          # Lines of code added/removed — moves with every commit
          plugin_lines: yes

          # Commit habits — what hours/days you build, from recent activity
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Isometric commit calendar — intensity view, last 6 months
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
